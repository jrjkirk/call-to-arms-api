name: Weekly TOW Call to Arms
on:
  schedule:
    - cron: '0 12 * * 0'  # Sundays at 12:00 UTC
  workflow_dispatch:

jobs:
  call_to_arms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python run_call_to_arms.py
        env:
          DISCORD_CALL_TO_ARMS_WEBHOOK_URL: ${{ secrets.DISCORD_CALL_TO_ARMS_WEBHOOK_URL }}
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}