name: Weekly Horus Heresy Call to Arms
on:
  schedule:
    - cron: "0 19 * * 2"  # 19:00 UTC Tuesdays; script itself skips off-weeks
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python run_hh_call_to_arms.py
        env:
          DISCORD_HH_CALL_TO_ARMS_WEBHOOK_URL: ${{ secrets.DISCORD_HH_CALL_TO_ARMS_WEBHOOK_URL }}
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}