name: Weekly Kill Team Call to Arms (manual fallback)
# Superseded by call-to-arms-check.yml (hourly, config-driven, per-club
# webhook). Kept for manual/emergency posting only — no longer scheduled.
on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python run_kt_call_to_arms.py
        env:
          DISCORD_KT_CALL_TO_ARMS_WEBHOOK_URL: ${{ secrets.DISCORD_KT_CALL_TO_ARMS_WEBHOOK_URL }}
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}