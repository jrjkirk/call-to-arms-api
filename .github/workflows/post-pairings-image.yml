name: Post Pairings Image to Discord
on:
  workflow_dispatch:
    inputs:
      system:
        description: 'System'
        required: true
        type: choice
        options:
          - 'The Old World'
          - 'The Horus Heresy'
          - 'Kill Team'
      week:
        description: 'Week (DD/MM/YYYY)'
        required: true
      club:
        description: 'Club slug (leave blank if only one club runs this system)'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt matplotlib
      - run: python scripts/post_pairings_image.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          SYSTEM: ${{ inputs.system }}
          WEEK: ${{ inputs.week }}
          CLUB: ${{ inputs.club }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_TOW_PAIRINGS_WEBHOOK_URL: ${{ secrets.DISCORD_TOW_PAIRINGS_WEBHOOK_URL }}
          DISCORD_HH_PAIRINGS_WEBHOOK_URL: ${{ secrets.DISCORD_HH_PAIRINGS_WEBHOOK_URL }}
          DISCORD_KT_PAIRINGS_WEBHOOK_URL: ${{ secrets.DISCORD_KT_PAIRINGS_WEBHOOK_URL }}
